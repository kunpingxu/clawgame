<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔥 俄罗斯方块 - 火火版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            color: white;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 10px;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
        }
        
        @media (max-width: 767px) {
            .container {
                gap: 10px;
                padding: 10px;
            }
        }
        
        .top-section {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .game-area {
            text-align: center;
        }
        
        h1 {
            font-size: 1.8em;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        #gameCanvas {
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            max-width: 100%;
            height: auto;
        }
        
        @media (max-width: 767px) {
            #gameCanvas {
                max-width: 160px;
            }
            
            .container {
                gap: 5px;
                padding: 5px;
            }
            
            h1 {
                font-size: 1em;
                margin-bottom: 5px;
            }
            
            .info-box {
                padding: 6px;
                min-width: 55px;
            }
            
            .info-box h3 {
                font-size: 0.7em;
                margin-bottom: 2px;
            }
            
            .info-box .value {
                font-size: 1em;
            }
            
            #nextCanvas {
                width: 60px;
                height: 60px;
            }
            
            .touch-btn {
                padding: 12px 15px;
                font-size: 1.2em;
                min-width: 50px;
                min-height: 50px;
            }
            
            .touch-controls {
                gap: 5px;
                margin-top: 5px;
            }
            
            .btn {
                padding: 8px 15px;
                font-size: 0.9em;
            }
        }
        
        .info-panel {
            display: flex;
            flex-direction: row;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .info-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            min-width: 100px;
            text-align: center;
        }
        
        .info-box h3 {
            font-size: 0.9em;
            margin-bottom: 5px;
            color: #ffd700;
        }
        
        .info-box .value {
            font-size: 1.5em;
            font-weight: bold;
        }
        
        #nextCanvas {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            margin-top: 5px;
        }
        
        .controls {
            display: none;
        }
        
        .touch-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }
        
        .touch-row {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        
        .touch-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 20px 25px;
            font-size: 1.5em;
            border-radius: 15px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            min-width: 70px;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .touch-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        
        .btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            max-width: 200px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(240, 147, 251, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            width: 90%;
            max-width: 400px;
        }
        
        .game-over.show {
            display: block;
        }
        
        .game-over h2 {
            font-size: 2em;
            color: #f5576c;
            margin-bottom: 20px;
        }
        
        .game-over p {
            font-size: 1.3em;
            margin-bottom: 30px;
        }
        
        @media (min-width: 768px) {
            .container {
                flex-direction: row;
                padding: 30px;
                gap: 30px;
                max-width: 900px;
            }
            
            .top-section {
                flex-direction: column;
            }
            
            .info-panel {
                flex-direction: column;
                min-width: 200px;
            }
            
            .info-box {
                min-width: auto;
                padding: 20px;
            }
            
            .info-box h3 {
                font-size: 1.2em;
            }
            
            .info-box .value {
                font-size: 2em;
            }
            
            h1 {
                font-size: 2.5em;
            }
            
            .controls {
                display: block;
                margin-top: 20px;
            }
            
            .controls h3 {
                margin-bottom: 15px;
                color: #ffd700;
            }
            
            .controls p {
                margin: 8px 0;
                font-size: 0.95em;
            }
            
            .controls kbd {
                background: rgba(255, 255, 255, 0.2);
                padding: 5px 12px;
                border-radius: 5px;
                font-family: monospace;
                margin: 0 5px;
            }
            
            .touch-controls {
                display: none;
            }
            
            .desktop-controls {
                display: block !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-section">
            <div class="game-area">
                <h1>🔥 俄罗斯方块</h1>
                <canvas id="gameCanvas" width="300" height="600"></canvas>
            </div>
            
            <div class="info-panel">
                <div class="info-box">
                    <h3>📊 得分</h3>
                    <div class="value" id="score">0</div>
                </div>
                
                <div class="info-box">
                    <h3>⬆️ 等级</h3>
                    <div class="value" id="level">1</div>
                </div>
                
                <div class="info-box">
                    <h3>🔄 下一个</h3>
                    <canvas id="nextCanvas" width="120" height="120"></canvas>
                </div>
                
                <div class="info-box controls">
                    <h3>🎮 操作说明</h3>
                    <p><kbd>←</kbd><kbd>→</kbd> 左右移动</p>
                    <p><kbd>↓</kbd> 加速下落</p>
                    <p><kbd>↑</kbd> 旋转</p>
                    <p><kbd>空格</kbd> 直接落底</p>
                    <p><kbd>P</kbd> 暂停/继续</p>
                </div>
            </div>
        </div>
        
        <div class="touch-controls">
            <div class="touch-row">
                <button class="touch-btn" id="btnRotate">🔄</button>
            </div>
            <div class="touch-row">
                <button class="touch-btn" id="btnLeft">⬅️</button>
                <button class="touch-btn" id="btnDown">⬇️</button>
                <button class="touch-btn" id="btnRight">➡️</button>
            </div>
            <div class="touch-row">
                <button class="touch-btn" id="btnDrop">💥</button>
            </div>
        </div>
        
        <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
            <button class="btn" id="startBtn">🎮 开始游戏</button>
            <button class="btn" id="pauseBtn" style="display: none;">⏸️ 暂停</button>
        </div>
        
        <div class="desktop-controls" style="display: none; margin-top: 15px;">
            <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 10px;">
                <button class="btn" id="desktopUp" style="min-width: 60px; padding: 10px;">⬆️</button>
            </div>
            <div style="display: flex; justify-content: center; gap: 10px;">
                <button class="btn" id="desktopLeft" style="min-width: 60px; padding: 10px;">⬅️</button>
                <button class="btn" id="desktopDown" style="min-width: 60px; padding: 10px;">⬇️</button>
                <button class="btn" id="desktopRight" style="min-width: 60px; padding: 10px;">➡️</button>
            </div>
            <div style="display: flex; justify-content: center; gap: 10px; margin-top: 10px;">
                <button class="btn" id="desktopPause" style="min-width: 60px; padding: 10px;">⏸️</button>
                <button class="btn" id="desktopDrop" style="min-width: 60px; padding: 10px;">💥</button>
            </div>
        </div>
    </div>
    
    <div class="game-over" id="gameOver">
        <h2>💥 游戏结束</h2>
        <p>最终得分: <span id="finalScore">0</span></p>
        <button class="btn" onclick="restartGame()">🔄 再来一局</button>
    </div>

    <script>
        let audioContext = null;
        let isMusicPlaying = false;
        
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playBackgroundMusic() {
            if (!audioContext) initAudio();
            if (isMusicPlaying) return;
            
            isMusicPlaying = true;
            
            function playNote(frequency, startTime, duration, gainValue) {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(frequency, startTime);
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(gainValue, startTime + 0.05);
                gain.gain.linearRampToValueAtTime(0, startTime + duration);
                osc.start(startTime);
                osc.stop(startTime + duration);
            }
            
            const melody = [
                262, 294, 330, 349, 392, 440, 494, 523,
                494, 440, 392, 349, 330, 294, 262,
                294, 330, 349, 392, 440, 494, 523,
                523, 494, 440, 392, 349, 330, 294, 262
            ];
            
            const now = audioContext.currentTime;
            melody.forEach((note, i) => {
                playNote(note, now + i * 0.3, 0.25, 0.08);
            });
            
            setTimeout(() => {
                isMusicPlaying = false;
                if (!isGameOver && !isPaused) {
                    playBackgroundMusic();
                }
            }, melody.length * 300 + 500);
        }
        
        function playSound(type) {
            if (!audioContext) initAudio();
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            const now = audioContext.currentTime;
            
            switch(type) {
                case 'move':
                    oscillator.frequency.setValueAtTime(200, now);
                    oscillator.frequency.exponentialRampToValueAtTime(150, now + 0.1);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    oscillator.start(now);
                    oscillator.stop(now + 0.1);
                    break;
                    
                case 'rotate':
                    oscillator.frequency.setValueAtTime(300, now);
                    oscillator.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    oscillator.start(now);
                    oscillator.stop(now + 0.15);
                    break;
                    
                case 'drop':
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(400, now);
                    oscillator.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                    gainNode.gain.setValueAtTime(0.35, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    oscillator.start(now);
                    oscillator.stop(now + 0.2);
                    break;
                    
                case 'clearLine':
                    const osc1 = audioContext.createOscillator();
                    const osc2 = audioContext.createOscillator();
                    const gain1 = audioContext.createGain();
                    const gain2 = audioContext.createGain();
                    
                    osc1.connect(gain1);
                    osc2.connect(gain2);
                    gain1.connect(audioContext.destination);
                    gain2.connect(audioContext.destination);
                    
                    osc1.frequency.setValueAtTime(523, now);
                    osc2.frequency.setValueAtTime(659, now);
                    osc1.frequency.setValueAtTime(784, now + 0.1);
                    osc2.frequency.setValueAtTime(988, now + 0.1);
                    
                    gain1.gain.setValueAtTime(0.35, now);
                    gain2.gain.setValueAtTime(0.35, now);
                    gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    
                    osc1.start(now);
                    osc2.start(now);
                    osc1.stop(now + 0.3);
                    osc2.stop(now + 0.3);
                    break;
                    
                case 'gameOver':
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(400, now);
                    oscillator.frequency.exponentialRampToValueAtTime(100, now + 0.5);
                    gainNode.gain.setValueAtTime(0.4, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    oscillator.start(now);
                    oscillator.stop(now + 0.5);
                    break;
                    
                case 'levelUp':
                    const notes = [523, 659, 784, 1047];
                    notes.forEach((freq, i) => {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.setValueAtTime(freq, now + i * 0.1);
                        gain.gain.setValueAtTime(0.3, now + i * 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.2);
                        osc.start(now + i * 0.1);
                        osc.stop(now + i * 0.1 + 0.2);
                    });
                    break;
            }
        }
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;
        const NEXT_BLOCK_SIZE = 25;
        
        const COLORS = [
            null,
            '#FF6B6B', // 红色 - I
            '#4ECDC4', // 青色 - J
            '#FFE66D', // 黄色 - L
            '#95E1D3', // 绿色 - O
            '#A8E6CF', // 浅绿 - S
            '#DDA0DD', // 紫色 - T
            '#87CEEB'  // 蓝色 - Z
        ];
        
        const SHAPES = [
            [],
            [[1, 1, 1, 1]],                    // I
            [[2, 0, 0], [2, 2, 2]],            // J
            [[0, 0, 3], [3, 3, 3]],            // L
            [[4, 4], [4, 4]],                  // O
            [[0, 5, 5], [5, 5, 0]],            // S
            [[0, 6, 0], [6, 6, 6]],            // T
            [[7, 7, 0], [0, 7, 7]]             // Z
        ];
        
        let board = [];
        let currentPiece = null;
        let nextPiece = null;
        let score = 0;
        let level = 1;
        let gameLoop = null;
        let isPaused = false;
        let isGameOver = false;
        let dropInterval = 1000;
        
        function initBoard() {
            board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
        }
        
        function createPiece(type) {
            return {
                type: type,
                shape: SHAPES[type].map(row => [...row]),
                x: Math.floor(COLS / 2) - Math.ceil(SHAPES[type][0].length / 2),
                y: 0
            };
        }
        
        function randomPiece() {
            const type = Math.floor(Math.random() * 7) + 1;
            return createPiece(type);
        }
        
        function drawBlock(ctx, x, y, color, size) {
            ctx.fillStyle = color;
            ctx.fillRect(x * size, y * size, size - 1, size - 1);
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(x * size, y * size, size - 1, 3);
            ctx.fillRect(x * size, y * size, 3, size - 1);
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(x * size + size - 4, y * size, 3, size - 1);
            ctx.fillRect(x * size, y * size + size - 4, size - 1, 3);
        }
        
        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            for (let x = 0; x <= COLS; x++) {
                ctx.beginPath();
                ctx.moveTo(x * BLOCK_SIZE, 0);
                ctx.lineTo(x * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= ROWS; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * BLOCK_SIZE);
                ctx.lineTo(canvas.width, y * BLOCK_SIZE);
                ctx.stroke();
            }
            
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (board[y][x]) {
                        drawBlock(ctx, x, y, COLORS[board[y][x]], BLOCK_SIZE);
                    }
                }
            }
            
            if (currentPiece) {
                for (let y = 0; y < currentPiece.shape.length; y++) {
                    for (let x = 0; x < currentPiece.shape[y].length; x++) {
                        if (currentPiece.shape[y][x]) {
                            drawBlock(ctx, currentPiece.x + x, currentPiece.y + y, 
                                     COLORS[currentPiece.shape[y][x]], BLOCK_SIZE);
                        }
                    }
                }
            }
        }
        
        function drawNext() {
            nextCtx.fillStyle = '#1a1a2e';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            if (nextPiece) {
                const offsetX = (nextCanvas.width / NEXT_BLOCK_SIZE - nextPiece.shape[0].length) / 2;
                const offsetY = (nextCanvas.height / NEXT_BLOCK_SIZE - nextPiece.shape.length) / 2;
                
                for (let y = 0; y < nextPiece.shape.length; y++) {
                    for (let x = 0; x < nextPiece.shape[y].length; x++) {
                        if (nextPiece.shape[y][x]) {
                            drawBlock(nextCtx, offsetX + x, offsetY + y, 
                                     COLORS[nextPiece.shape[y][x]], NEXT_BLOCK_SIZE);
                        }
                    }
                }
            }
        }
        
        function collision(piece, offsetX = 0, offsetY = 0) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        const newX = piece.x + x + offsetX;
                        const newY = piece.y + y + offsetY;
                        
                        if (newX < 0 || newX >= COLS || newY >= ROWS) {
                            return true;
                        }
                        if (newY >= 0 && board[newY][newX]) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }
        
        function merge() {
            for (let y = 0; y < currentPiece.shape.length; y++) {
                for (let x = 0; x < currentPiece.shape[y].length; x++) {
                    if (currentPiece.shape[y][x]) {
                        const boardY = currentPiece.y + y;
                        const boardX = currentPiece.x + x;
                        if (boardY >= 0) {
                            board[boardY][boardX] = currentPiece.shape[y][x];
                        }
                    }
                }
            }
        }
        
        function rotate() {
            const rotated = currentPiece.shape[0].map((_, i) =>
                currentPiece.shape.map(row => row[i]).reverse()
            );
            
            const previous = currentPiece.shape;
            currentPiece.shape = rotated;
            
            if (collision(currentPiece)) {
                currentPiece.shape = previous;
            }
        }
        
        function clearLines() {
            let linesCleared = 0;
            const oldLevel = level;
            
            for (let y = ROWS - 1; y >= 0; y--) {
                if (board[y].every(cell => cell !== 0)) {
                    board.splice(y, 1);
                    board.unshift(Array(COLS).fill(0));
                    linesCleared++;
                    y++;
                }
            }
            
            if (linesCleared > 0) {
                playSound('clearLine');
                const points = [0, 100, 300, 500, 800];
                score += points[linesCleared] * level;
                level = Math.floor(score / 1000) + 1;
                dropInterval = Math.max(100, 1000 - (level - 1) * 100);
                
                if (level > oldLevel) {
                    playSound('levelUp');
                }
                
                document.getElementById('score').textContent = score;
                document.getElementById('level').textContent = level;
            }
        }
        
        function drop() {
            if (!collision(currentPiece, 0, 1)) {
                currentPiece.y++;
            } else {
                playSound('drop');
                merge();
                clearLines();
                currentPiece = nextPiece;
                nextPiece = randomPiece();
                drawNext();
                
                if (collision(currentPiece)) {
                    gameOver();
                }
            }
            draw();
        }
        
        function hardDrop() {
            while (!collision(currentPiece, 0, 1)) {
                currentPiece.y++;
                score += 2;
            }
            document.getElementById('score').textContent = score;
            drop();
        }
        
        function moveLeft() {
            if (!collision(currentPiece, -1, 0)) {
                currentPiece.x--;
                playSound('move');
                draw();
            }
        }
        
        function moveRight() {
            if (!collision(currentPiece, 1, 0)) {
                currentPiece.x++;
                playSound('move');
                draw();
            }
        }
        
        function moveDown() {
            if (!collision(currentPiece, 0, 1)) {
                currentPiece.y++;
                score += 1;
                document.getElementById('score').textContent = score;
                playSound('move');
                draw();
            }
        }
        
        function rotatePiece() {
            rotate();
            playSound('rotate');
            draw();
        }
        
        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);
            playSound('gameOver');
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('show');
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('pauseBtn').style.display = 'none';
        }
        
        function restartGame() {
            document.getElementById('gameOver').classList.remove('show');
            startGame();
        }
        
        function startGame() {
            initAudio();
            initBoard();
            score = 0;
            level = 1;
            dropInterval = 1000;
            isPaused = false;
            isGameOver = false;
            isMusicPlaying = false;
            
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            
            currentPiece = randomPiece();
            nextPiece = randomPiece();
            drawNext();
            draw();
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('pauseBtn').style.display = 'block';
            
            playBackgroundMusic();
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(() => {
                if (!isPaused && !isGameOver) {
                    drop();
                }
            }, dropInterval);
        }
        
        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? '▶️ 继续' : '⏸️ 暂停';
        }
        
        document.addEventListener('keydown', (e) => {
            if (!currentPiece || isGameOver) return;
            
            if (e.key.toLowerCase() === 'p') {
                togglePause();
                return;
            }
            
            if (isPaused) return;
            
            switch (e.key) {
                case 'ArrowLeft':
                    moveLeft();
                    break;
                case 'ArrowRight':
                    moveRight();
                    break;
                case 'ArrowDown':
                    moveDown();
                    break;
                case 'ArrowUp':
                    rotatePiece();
                    break;
                case ' ':
                    e.preventDefault();
                    hardDrop();
                    break;
            }
        });
        
        document.getElementById('btnLeft').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!currentPiece || isPaused || isGameOver) return;
            moveLeft();
        });
        
        document.getElementById('btnRight').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!currentPiece || isPaused || isGameOver) return;
            moveRight();
        });
        
        document.getElementById('btnDown').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!currentPiece || isPaused || isGameOver) return;
            moveDown();
        });
        
        document.getElementById('btnRotate').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!currentPiece || isPaused || isGameOver) return;
            rotatePiece();
        });
        
        document.getElementById('btnDrop').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!currentPiece || isPaused || isGameOver) return;
            hardDrop();
        });
        
        document.getElementById('btnLeft').addEventListener('click', () => {
            if (!currentPiece || isPaused || isGameOver) return;
            moveLeft();
        });
        
        document.getElementById('btnRight').addEventListener('click', () => {
            if (!currentPiece || isPaused || isGameOver) return;
            moveRight();
        });
        
        document.getElementById('btnDown').addEventListener('click', () => {
            if (!currentPiece || isPaused || isGameOver) return;
            moveDown();
        });
        
        document.getElementById('btnRotate').addEventListener('click', () => {
            if (!currentPiece || isPaused || isGameOver) return;
            rotatePiece();
        });
        
        document.getElementById('btnDrop').addEventListener('click', () => {
            if (!currentPiece || isPaused || isGameOver) return;
            hardDrop();
        });
        
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('pauseBtn').addEventListener('click', togglePause);
        
        document.getElementById('desktopUp').addEventListener('click', () => {
            if (!currentPiece || isPaused || isGameOver) return;
            rotatePiece();
        });
        
        document.getElementById('desktopDown').addEventListener('click', () => {
            if (!currentPiece || isPaused || isGameOver) return;
            moveDown();
        });
        
        document.getElementById('desktopLeft').addEventListener('click', () => {
            if (!currentPiece || isPaused || isGameOver) return;
            moveLeft();
        });
        
        document.getElementById('desktopRight').addEventListener('click', () => {
            if (!currentPiece || isPaused || isGameOver) return;
            moveRight();
        });
        
        document.getElementById('desktopPause').addEventListener('click', togglePause);
        
        document.getElementById('desktopDrop').addEventListener('click', () => {
            if (!currentPiece || isPaused || isGameOver) return;
            hardDrop();
        });
        
        initBoard();
        draw();
        drawNext();
    </script>
</body>
</html>
