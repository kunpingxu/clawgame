<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🧩 数字消消乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
            padding: 10px;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
        }
        
        h1 {
            text-align: center;
            font-size: 1.8em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .info-panel {
            display: flex;
            justify-content: space-around;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .info-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            text-align: center;
            flex: 1;
            min-width: 80px;
        }
        
        .info-box h3 {
            font-size: 0.9em;
            margin-bottom: 5px;
            color: #ffd700;
        }
        
        .info-box .value {
            font-size: 1.8em;
            font-weight: bold;
        }
        
        .game-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
        }
        
        .tile {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            user-select: none;
            -webkit-user-select: none;
        }
        
        .tile:hover {
            transform: scale(1.05);
        }
        
        .tile.selected {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(240, 147, 251, 0.6);
        }
        
        .tile.matched {
            animation: matchAnim 0.5s ease-out;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        
        @keyframes matchAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(0); }
        }
        
        .btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(240, 147, 251, 0.4);
        }
        
        .game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            width: 90%;
            max-width: 350px;
        }
        
        .game-over.show {
            display: block;
        }
        
        .game-over h2 {
            font-size: 2em;
            color: #f5576c;
            margin-bottom: 20px;
        }
        
        .game-over p {
            font-size: 1.3em;
            margin-bottom: 30px;
        }
        
        .hint {
            text-align: center;
            font-size: 0.9em;
            opacity: 0.8;
            padding: 10px;
        }
        
        @media (max-width: 400px) {
            .container {
                padding: 15px;
                gap: 10px;
            }
            
            h1 {
                font-size: 1.4em;
            }
            
            .info-box {
                padding: 10px;
                min-width: 60px;
            }
            
            .info-box h3 {
                font-size: 0.8em;
            }
            
            .info-box .value {
                font-size: 1.4em;
            }
            
            .game-board {
                gap: 6px;
                padding: 10px;
            }
            
            .tile {
                font-size: 1.2em;
                border-radius: 8px;
            }
            
            .btn {
                padding: 12px 20px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧩 数字消消乐</h1>
        
        <div class="info-panel">
            <div class="info-box">
                <h3>📊 得分</h3>
                <div class="value" id="score">0</div>
            </div>
            <div class="info-box">
                <h3>⏱️ 时间</h3>
                <div class="value" id="timer">60</div>
            </div>
            <div class="info-box">
                <h3>🎯 关卡</h3>
                <div class="value" id="level">1</div>
            </div>
        </div>
        
        <div class="game-board" id="gameBoard"></div>
        
        <div class="hint">
            💡 点击两个相同的数字即可消除！
        </div>
        
        <button class="btn" id="startBtn">🎮 开始游戏</button>
        <button class="btn" id="restartBtn" style="display: none;">🔄 再来一局</button>
    </div>
    
    <div class="game-over" id="gameOver">
        <h2>🎉 游戏结束</h2>
        <p>最终得分: <span id="finalScore">0</span></p>
        <button class="btn" onclick="restartGame()">🔄 再来一局</button>
    </div>

    <script>
        let audioContext = null;
        
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playSound(type) {
            if (!audioContext) initAudio();
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            const now = audioContext.currentTime;
            
            switch(type) {
                case 'select':
                    oscillator.frequency.setValueAtTime(400, now);
                    oscillator.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                    gainNode.gain.setValueAtTime(0.2, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    oscillator.start(now);
                    oscillator.stop(now + 0.1);
                    break;
                    
                case 'match':
                    const osc1 = audioContext.createOscillator();
                    const osc2 = audioContext.createOscillator();
                    const gain1 = audioContext.createGain();
                    const gain2 = audioContext.createGain();
                    
                    osc1.connect(gain1);
                    osc2.connect(gain2);
                    gain1.connect(audioContext.destination);
                    gain2.connect(audioContext.destination);
                    
                    osc1.frequency.setValueAtTime(523, now);
                    osc2.frequency.setValueAtTime(659, now);
                    osc1.frequency.setValueAtTime(784, now + 0.1);
                    osc2.frequency.setValueAtTime(988, now + 0.1);
                    
                    gain1.gain.setValueAtTime(0.25, now);
                    gain2.gain.setValueAtTime(0.25, now);
                    gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    
                    osc1.start(now);
                    osc2.start(now);
                    osc1.stop(now + 0.3);
                    osc2.stop(now + 0.3);
                    break;
                    
                case 'gameOver':
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(400, now);
                    oscillator.frequency.exponentialRampToValueAtTime(100, now + 0.5);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    oscillator.start(now);
                    oscillator.stop(now + 0.5);
                    break;
                    
                case 'levelUp':
                    const notes = [523, 659, 784, 1047];
                    notes.forEach((freq, i) => {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.setValueAtTime(freq, now + i * 0.1);
                        gain.gain.setValueAtTime(0.2, now + i * 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.2);
                        osc.start(now + i * 0.1);
                        osc.stop(now + i * 0.1 + 0.2);
                    });
                    break;
            }
        }
        
        let board = [];
        let selectedTile = null;
        let score = 0;
        let level = 1;
        let timeLeft = 60;
        let timerInterval = null;
        let isGameOver = false;
        let isPlaying = false;
        
        const BOARD_SIZE = 5;
        const NUMBERS = [1, 2, 3, 4, 5, 6, 7, 8];
        
        function initBoard() {
            board = [];
            const pairs = [];
            const totalTiles = BOARD_SIZE * BOARD_SIZE;
            const numPairs = Math.floor(totalTiles / 2);
            
            for (let i = 0; i < numPairs; i++) {
                const num = NUMBERS[i % NUMBERS.length];
                pairs.push(num, num);
            }
            
            if (totalTiles % 2 !== 0) {
                pairs.push(NUMBERS[Math.floor(Math.random() * NUMBERS.length)]);
            }
            
            for (let i = pairs.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pairs[i], pairs[j]] = [pairs[j], pairs[i]];
            }
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                board[i] = [];
                for (let j = 0; j < BOARD_SIZE; j++) {
                    board[i][j] = {
                        value: pairs[i * BOARD_SIZE + j],
                        matched: false
                    };
                }
            }
        }
        
        function renderBoard() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.dataset.row = i;
                    tile.dataset.col = j;
                    
                    if (board[i][j].matched) {
                        tile.style.visibility = 'hidden';
                    } else {
                        tile.textContent = board[i][j].value;
                    }
                    
                    tile.addEventListener('click', () => handleTileClick(i, j));
                    gameBoard.appendChild(tile);
                }
            }
        }
        
        function handleTileClick(row, col) {
            if (!isPlaying || isGameOver || board[row][col].matched) return;
            
            initAudio();
            
            const tile = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
            
            if (selectedTile === null) {
                selectedTile = { row, col };
                tile.classList.add('selected');
                playSound('select');
            } else {
                if (selectedTile.row === row && selectedTile.col === col) {
                    tile.classList.remove('selected');
                    selectedTile = null;
                    return;
                }
                
                const prevTile = document.querySelector(`[data-row="${selectedTile.row}"][data-col="${selectedTile.col}"]`);
                
                if (board[selectedTile.row][selectedTile.col].value === board[row][col].value) {
                    playSound('match');
                    
                    prevTile.classList.remove('selected');
                    prevTile.classList.add('matched');
                    tile.classList.add('matched');
                    
                    setTimeout(() => {
                        board[selectedTile.row][selectedTile.col].matched = true;
                        board[row][col].matched = true;
                        
                        score += 10 * level;
                        document.getElementById('score').textContent = score;
                        
                        selectedTile = null;
                        checkWin();
                        renderBoard();
                    }, 500);
                } else {
                    prevTile.classList.remove('selected');
                    tile.classList.add('selected');
                    selectedTile = { row, col };
                    playSound('select');
                }
            }
        }
        
        function checkWin() {
            let allMatched = true;
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (!board[i][j].matched) {
                        allMatched = false;
                        break;
                    }
                }
            }
            
            if (allMatched) {
                level++;
                timeLeft += 30;
                score += 100 * level;
                document.getElementById('level').textContent = level;
                document.getElementById('score').textContent = score;
                playSound('levelUp');
                
                setTimeout(() => {
                    initBoard();
                    renderBoard();
                }, 500);
            }
        }
        
        function startGame() {
            initAudio();
            isPlaying = true;
            isGameOver = false;
            score = 0;
            level = 1;
            timeLeft = 60;
            selectedTile = null;
            
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('timer').textContent = timeLeft;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('restartBtn').style.display = 'block';
            
            initBoard();
            renderBoard();
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (isPlaying && !isGameOver) {
                    timeLeft--;
                    document.getElementById('timer').textContent = timeLeft;
                    
                    if (timeLeft <= 0) {
                        endGame();
                    }
                }
            }, 1000);
        }
        
        function endGame() {
            isGameOver = true;
            isPlaying = false;
            clearInterval(timerInterval);
            playSound('gameOver');
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('show');
        }
        
        function restartGame() {
            document.getElementById('gameOver').classList.remove('show');
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('restartBtn').style.display = 'none';
        }
        
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', () => {
            isPlaying = false;
            if (timerInterval) clearInterval(timerInterval);
            restartGame();
        });
        
        initBoard();
        renderBoard();
    </script>
</body>
</html>
